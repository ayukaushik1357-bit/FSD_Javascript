<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM</title>
</head>
<body style="background-color: #212121; color: #fff;">
    <div class="parent">
        <div class="days">Monday</div>
        <div class="days">Tuesday</div>
        <div class="days">Wednesday</div>
        <div class="days">Thursday</div>
    </div>
</body>
<script>
    const par = document.querySelector('.parent');
    console.log(par);
    console.log(par.children);
    console.log(par.children[0]);
    console.log(par.children[0].innerHTML);

    for (let i = 0; i < par.children.length; i++) {
        console.log(par.children[i].innerHTML);
    }

    console.log(par.firstElementChild);
    console.log(par.lastElementChild);
    par.children[1].style.color = "red";

    const dayOne = document.querySelector('.days')
    console.log(dayOne);
    console.log(dayOne.parentElement);
    console.log(dayOne.nextElementSibling);
    console.log("Nodes: ", parent.childNodes);
    
</script>
</html>
